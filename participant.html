<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인정보 입력 - 선문대학교 치위생학과</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button class="back-button" onclick="goBack()">뒤로가기</button>

    <div class="container">
        <header class="main-header">
            <h1>개인정보 입력</h1>
            <h2>대상자 정보</h2>
        </header>

        <main class="main-content">
            <p style="text-align: center; margin-bottom: 30px; font-size: 1.1em; color: var(--text-light);">
                실습 진행을 위한 정보를 입력해주세요.
            </p>

            <form id="participantForm">
                <div class="form-group">
                    <label for="participantName">이름 <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="participantName" placeholder="이름을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="participantBirthdate">생년월일 <span style="color: var(--danger);">*</span></label>
                    <input type="date" id="participantBirthdate" required>
                </div>

                <div class="form-group">
                    <label for="participantGender">성별 <span style="color: var(--danger);">*</span></label>
                    <select id="participantGender" required>
                        <option value="">선택해주세요</option>
                        <option value="남성">남성</option>
                        <option value="여성">여성</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="participantPhone">전화번호 <span style="color: var(--danger);">*</span></label>
                    <input type="tel" id="participantPhone" placeholder="010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label for="participantAddress">주소 <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="participantAddress" placeholder="주소를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="participantOccupation">직업 <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="participantOccupation" placeholder="직업을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="relationshipType">술자와의 관계 <span style="color: var(--danger);">*</span></label>
                    <select id="relationshipType" onchange="handleRelationshipChange()" required>
                        <option value="">선택해주세요</option>
                        <option value="가족">가족</option>
                        <option value="치위생학과 선후배">치위생학과 선후배</option>
                        <option value="친구">친구</option>
                        <option value="동아리">동아리</option>
                        <option value="물리치료학과">물리치료학과</option>
                        <option value="직접입력">직접입력</option>
                    </select>
                </div>

                <div class="form-group" id="customRelationshipGroup" style="display: none;">
                    <label for="customRelationship">관계 직접입력 <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="customRelationship" placeholder="관계를 입력하세요">
                </div>

                <div class="notice-box" style="margin: 30px 0;">
                    <h4>유의사항</h4>
                    <ul>
                        <li>입력하신 전화번호로 실습생이 개별 연락드립니다.</li>
                        <li>정확한 정보를 입력해주시기 바랍니다.</li>
                        <li>입력된 정보는 실습 목적으로만 사용됩니다.</li>
                    </ul>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-primary" onclick="submitParticipantInfo()">
                        다음으로
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/participant.js"></script>
</body>
</html>
