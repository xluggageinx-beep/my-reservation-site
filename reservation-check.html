<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 날짜 선택 - 선문대학교 치위생학과</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button class="back-button" onclick="goBack()">뒤로가기</button>

    <div class="container">
        <header class="main-header">
            <h1>예약 날짜 선택</h1>
            <h2 id="operatorTitle"></h2>
        </header>

        <main class="main-content">
            <div class="time-card">
                <div id="timeInfo"></div>
                
                <h3 style="margin-top: 30px; margin-bottom: 20px;">예약 가능한 날짜</h3>
                <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">
                    원하시는 날짜를 선택해주세요.
                </p>

                <div id="dateGrid" class="date-grid"></div>
            </div>

            <div class="warning-box" style="margin-top: 30px;">
                <h4>유의사항</h4>
                <ul>
                    <li>회색으로 표시된 날짜는 이미 예약되었거나 지난 날짜입니다.</li>
                    <li>예약 후에는 술자가 개별 연락드립니다.</li>
                    <li><strong style="color: var(--danger);">부득이한 취소 시 최소 3일 전 사전 연락 부탁드립니다.</strong></li>
                </ul>
            </div>
        </main>
    </div>

    <!-- 예약 확인 모달 -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>예약 확인</h3>
            <div id="confirmContent" style="padding: 20px 0; font-size: 1.1em; text-align: center; line-height: 2;"></div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="confirmReservation()">확인</button>
                <button class="btn btn-secondary" onclick="closeConfirmModal()">취소</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/reservation.js"></script>
</body>
</html>
